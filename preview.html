<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shot Card Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f0f0f0;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    gap: 32px;
    flex-wrap: wrap;
  }

  :root {
    --bg-secondary: #f5f5f5;
    --bg-card: #ffffff;
    --border-subtle: #e8e8e8;
    --text-primary: #0a0a0a;
    --text-secondary: #555;
    --text-muted: #999;
    --accent: #0a0a0a;
    --radius-sm: 6px;
    --radius-md: 10px;
    --transition-fast: 0.15s ease;
  }

  .preview-box {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    width: 520px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.08);
  }
  .preview-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #999;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* ─── Shot Card ─── */
  .shot-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 14px;
    margin-bottom: 10px;
  }
  .shot-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .shot-card-title {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-primary);
  }
  .shot-remove-btn {
    width: 22px; height: 22px;
    background: none;
    border: 1px solid var(--border-subtle);
    border-radius: 50%;
    cursor: pointer;
    font-size: 0.6rem;
    color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
  }
  .shot-remove-btn:hover { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }

  /* ─── Carousel ─── */
  .cam-carousel {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cam-nav-btn {
    flex-shrink: 0;
    width: 28px; height: 28px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-subtle);
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.1rem;
    color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    transition: background var(--transition-fast), color var(--transition-fast), border-color var(--transition-fast);
    user-select: none;
  }
  .cam-nav-btn:hover:not(:disabled) { background: var(--accent); color: #fff; border-color: var(--accent); }
  .cam-nav-btn:disabled { opacity: 0.25; cursor: default; }

  .cam-track-wrapper { flex: 1; overflow: hidden; }
  .cam-track {
    display: flex;
    gap: 6px;
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ─── Cam Button ─── */
  .cam-btn {
    flex: 0 0 calc(25% - 5px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 8px 4px;
    background: var(--bg-secondary);
    border: 1.5px solid transparent;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 0.62rem;
    font-weight: 500;
    color: var(--text-secondary);
    transition: border-color var(--transition-fast), background var(--transition-fast), color var(--transition-fast);
    white-space: nowrap;
  }
  .cam-btn:hover { border-color: #d1d5db; color: var(--text-primary); }
  .cam-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }

  /* ─── Cam Anim Icons ─── */
  .cam-anim { width: 28px; height: 20px; display: flex; align-items: center; justify-content: center; position: relative; }
  .cam-anim-inner { width: 16px; height: 11px; border: 1.5px solid currentColor; border-radius: 2px; opacity: 0.8; }

  .dolly-in-inner  { animation: dollyIn  1.4s ease-in-out infinite; }
  .dolly-out-inner { animation: dollyOut 1.4s ease-in-out infinite; }
  @keyframes dollyIn  { 0%,100%{transform:scale(1)}   50%{transform:scale(0.58)} }
  @keyframes dollyOut { 0%,100%{transform:scale(0.58)} 50%{transform:scale(1)} }

  .orbit-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: currentColor;
    position: absolute; left: 50%; top: 50%;
    animation: orbitAnim 1.6s linear infinite;
    transform-origin: 0 0;
  }
  @keyframes orbitAnim { from{transform:rotate(0deg) translateX(9px)} to{transform:rotate(360deg) translateX(9px)} }

  .pan-line { width: 14px; height: 2px; background: currentColor; border-radius: 1px; opacity: 0.8; animation: panAnim 1.4s ease-in-out infinite; }
  @keyframes panAnim { 0%,100%{transform:translateX(-4px)} 50%{transform:translateX(4px)} }

  .tilt-line { width: 2px; height: 14px; background: currentColor; border-radius: 1px; opacity: 0.8; animation: tiltAnim 1.4s ease-in-out infinite; }
  @keyframes tiltAnim { 0%,100%{transform:translateY(3px)} 50%{transform:translateY(-3px)} }

  .tracking-rect { width: 11px; height: 9px; border: 1.5px solid currentColor; border-radius: 2px; opacity: 0.8; animation: trackingAnim 1.4s ease-in-out infinite; }
  @keyframes trackingAnim { 0%,100%{transform:translateX(-4px)} 50%{transform:translateX(4px)} }

  .crane-rect { width: 11px; height: 9px; border: 1.5px solid currentColor; border-radius: 2px; opacity: 0.8; animation: craneAnim 1.4s ease-in-out infinite; }
  @keyframes craneAnim { 0%,100%{transform:translateY(3px)} 50%{transform:translateY(-3px)} }

  .static-rect { width: 14px; height: 10px; border: 1.5px solid currentColor; border-radius: 2px; opacity: 0.8; }

  /* ─── Duration ─── */
  .shot-dur-row { margin-top: 12px; }
  .shot-dur-labels { display: flex; justify-content: space-between; font-size: 0.71rem; color: var(--text-secondary); margin-bottom: 5px; }
  input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }

  /* ─── Desc Row ─── */
  .shot-desc-row { display: flex; gap: 6px; align-items: flex-start; margin-top: 10px; }
  .shot-desc {
    flex: 1;
    font-family: inherit;
    font-size: 0.72rem;
    line-height: 1.6;
    color: var(--text-primary);
    background: var(--bg-secondary);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    resize: vertical;
    min-height: 76px;
    outline: none;
    transition: border-color var(--transition-fast);
  }
  .shot-desc:focus { border-color: var(--accent); }
  .shot-desc::placeholder { color: var(--text-muted); }
  .shot-ai-btn {
    flex-shrink: 0;
    width: 32px; height: 32px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    color: var(--accent);
    font-size: 0.85rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--transition-fast), color var(--transition-fast), border-color var(--transition-fast);
  }
  .shot-ai-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ─── Dark Mode ─── */
  .dark-box {
    --bg-secondary: #1e1e1e;
    --bg-card: #161616;
    --border-subtle: #2e2e2e;
    --text-primary: #f0f0f0;
    --text-secondary: #888;
    --text-muted: #555;
    --accent: #f0f0f0;
    background: #111;
    color: #f0f0f0;
  }
  .dark-box .cam-btn.active { background: #f0f0f0; color: #111; border-color: #f0f0f0; }
  .dark-box .shot-ai-btn:hover { background: #f0f0f0; color: #111; border-color: #f0f0f0; }
</style>
</head>
<body>

<!-- ── Light Mode ── -->
<div class="preview-box">
  <div class="preview-label">Light Mode</div>
  <div id="shot-0" class="shot-card"></div>
  <div id="shot-1" class="shot-card"></div>
</div>

<!-- ── Dark Mode ── -->
<div class="preview-box dark-box">
  <div class="preview-label" style="color:#444">Dark Mode</div>
  <div id="shot-2" class="shot-card"></div>
  <div id="shot-3" class="shot-card"></div>
</div>

<script>
const CAM_MOVES = [
  { value: "dolly_in",  label: "Dolly In",  icon: '<div class="cam-anim-inner dolly-in-inner"></div>' },
  { value: "dolly_out", label: "Dolly Out", icon: '<div class="cam-anim-inner dolly-out-inner"></div>' },
  { value: "orbit",     label: "Orbit",     icon: '<div class="orbit-dot"></div>' },
  { value: "pan",       label: "Pan",       icon: '<div class="pan-line"></div>' },
  { value: "tilt_up",   label: "Tilt Up",   icon: '<div class="tilt-line"></div>' },
  { value: "tracking",  label: "Tracking",  icon: '<div class="tracking-rect"></div>' },
  { value: "crane",     label: "Crane",     icon: '<div class="crane-rect"></div>' },
  { value: "static",    label: "Static",    icon: '<div class="static-rect"></div>' },
];

const PAGE = 4;
const MAX_OFFSET = CAM_MOVES.length - PAGE; // = 4

const state = {};

function buildCard(containerId, shotIdx, activeMove, defaultDesc) {
  const el = document.getElementById(containerId);
  state[shotIdx] = { offset: 0, active: activeMove };

  el.innerHTML = `
    <div class="shot-card-header">
      <span class="shot-card-title">Sahne ${shotIdx % 2 + 1} · <span id="dur-${shotIdx}">5</span>sn</span>
      <button class="shot-remove-btn">✕</button>
    </div>

    <div class="cam-carousel">
      <button class="cam-nav-btn" id="prev-${shotIdx}" onclick="shiftPage(${shotIdx},-1)">‹</button>
      <div class="cam-track-wrapper">
        <div class="cam-track" id="track-${shotIdx}">
          ${CAM_MOVES.map((cm, i) => `
            <button class="cam-btn${cm.value === activeMove ? ' active' : ''}"
                    id="btn-${shotIdx}-${i}"
                    onclick="pickCam(${shotIdx},${i})">
              <div class="cam-anim">${cm.icon}</div>
              <span>${cm.label}</span>
            </button>
          `).join('')}
        </div>
      </div>
      <button class="cam-nav-btn" id="next-${shotIdx}" onclick="shiftPage(${shotIdx},1)">›</button>
    </div>

    <div class="shot-dur-row">
      <div class="shot-dur-labels"><span>Süre</span><span><span id="dur2-${shotIdx}">5</span>sn</span></div>
      <input type="range" min="3" max="10" value="5" oninput="updateDur(${shotIdx},this.value)">
    </div>

    <div class="shot-desc-row">
      <textarea class="shot-desc" placeholder="Kendi istediğinizi yazın (Türkçe olabilir) veya ✦ AI'ya bırakın">${defaultDesc}</textarea>
      <button class="shot-ai-btn" title="AI ile sinematik prompt üret">✦</button>
    </div>
  `;

  updateNav(shotIdx);
}

function shiftPage(idx, dir) {
  state[idx].offset = Math.max(0, Math.min(MAX_OFFSET, state[idx].offset + PAGE * dir));
  applyTranslate(idx);
  updateNav(idx);
}

function applyTranslate(idx) {
  const track = document.getElementById(`track-${idx}`);
  const wrapper = track.parentElement;
  const btnW = (wrapper.offsetWidth + 6) / PAGE; // +6 gap
  track.style.transform = `translateX(-${state[idx].offset * btnW}px)`;
}

function updateNav(idx) {
  document.getElementById(`prev-${idx}`).disabled = state[idx].offset === 0;
  document.getElementById(`next-${idx}`).disabled = state[idx].offset >= MAX_OFFSET;
}

function pickCam(idx, btnIdx) {
  CAM_MOVES.forEach((_, i) => {
    document.getElementById(`btn-${idx}-${i}`)?.classList.remove('active');
  });
  document.getElementById(`btn-${idx}-${btnIdx}`)?.classList.add('active');
  state[idx].active = CAM_MOVES[btnIdx].value;
}

function updateDur(idx, val) {
  document.getElementById(`dur-${idx}`).textContent = val;
  document.getElementById(`dur2-${idx}`).textContent = val;
}

window.addEventListener('resize', () => {
  Object.keys(state).forEach(idx => applyTranslate(Number(idx)));
});

// Build all cards
buildCard('shot-0', 0, 'dolly_in',
  'Dolly in on a woman descending the grand staircase in an opulent hall, her outfit flowing elegantly, under warm chandelier lighting.');
buildCard('shot-1', 1, 'orbit', '');
buildCard('shot-2', 2, 'dolly_in',
  'Seamlessly continuing, model turns at base of grand staircase, orbit shot reveals full outfit, warm chandelier glow.');
buildCard('shot-3', 3, 'tracking', '');
</script>
</body>
</html>
