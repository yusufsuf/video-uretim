<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş — Antigravity Video Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --card: rgba(8, 8, 16, 0.72);
            --border: rgba(255, 255, 255, 0.07);
            --border-accent: rgba(255, 255, 255, 0.12);
            --text: #f0f0f0;
            --text-muted: #666666;
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-border: rgba(255, 255, 255, 0.1);
            --gradient-btn: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
            --btn-text: #0a0a0a;
            --error: #b85450;
            --font: 'Inter', sans-serif;
            --font-display: 'Outfit', sans-serif;
        }

        body {
            font-family: var(--font);
            background: #070710;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Mesh Gradient Background ── */
        #bg-shader {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: #070710;
            overflow: hidden;
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            will-change: transform;
        }

        .bg-blob-1 {
            width: 700px; height: 700px;
            background: radial-gradient(circle, #1e0a5e 0%, transparent 70%);
            top: -20%; left: -10%;
            animation: blob1 14s ease-in-out infinite alternate;
        }

        .bg-blob-2 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, #0a1a55 0%, transparent 70%);
            top: 20%; right: -15%;
            animation: blob2 11s ease-in-out infinite alternate;
        }

        .bg-blob-3 {
            width: 550px; height: 550px;
            background: radial-gradient(circle, #30084a 0%, transparent 70%);
            bottom: -15%; left: 25%;
            animation: blob3 16s ease-in-out infinite alternate;
        }

        .bg-blob-4 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #0a2040 0%, transparent 70%);
            top: 50%; left: -5%;
            animation: blob4 9s ease-in-out infinite alternate;
        }

        @keyframes blob1 {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(12%, 18%) scale(1.15); }
        }
        @keyframes blob2 {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(-10%, -14%) scale(0.88); }
        }
        @keyframes blob3 {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(15%, -12%) scale(1.12); }
        }
        @keyframes blob4 {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(8%, -20%) scale(1.2); }
        }

        /* ── Auth Card ── */
        .auth-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            background: var(--card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 40px 36px;
            margin: 20px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 1px 0 rgba(255,255,255,0.05) inset;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }

        .auth-logo-mark {
            width: 34px;
            height: 34px;
            background: #ffffff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1rem;
            color: #0a0a0a;
            flex-shrink: 0;
        }

        .auth-logo-name {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1rem;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .auth-title {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--text);
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }

        .auth-sub {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .form-label {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-input {
            width: 100%;
            padding: 10px 14px;
            font-size: 0.85rem;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text);
            font-family: var(--font);
            outline: none;
            transition: border-color 0.15s ease, background 0.15s ease;
        }

        .form-input:focus {
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.18);
        }

        .submit-btn {
            width: 100%;
            padding: 11px;
            margin-top: 8px;
            background: var(--gradient-btn);
            color: var(--btn-text);
            border: none;
            border-radius: 8px;
            font-family: var(--font);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: opacity 0.15s ease, transform 0.15s ease;
            letter-spacing: 0.01em;
        }

        .submit-btn:hover:not(:disabled) {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .auth-footer {
            text-align: center;
            margin-top: 22px;
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .error-box {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: rgba(184, 84, 80, 0.1);
            border: 1px solid rgba(184, 84, 80, 0.3);
            border-radius: 8px;
            color: #d97370;
            font-size: 0.78rem;
            margin-bottom: 16px;
        }

        .error-box.show {
            display: flex;
        }
    </style>
</head>
<body>

<div id="bg-shader">
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>
    <div class="bg-blob bg-blob-4"></div>
</div>

<div class="auth-card">
    <div class="auth-logo">
        <div class="auth-logo-mark">A</div>
        <div class="auth-logo-name">Video Studio</div>
    </div>

    <h1 class="auth-title">Giriş Yap</h1>
    <p class="auth-sub">Hesabınıza erişmek için giriş yapın.</p>

    <div class="error-box" id="error-box">
        <span>⚠</span>
        <span id="error-msg"></span>
    </div>

    <form id="login-form">
        <div class="form-group">
            <label class="form-label" for="email">E-posta</label>
            <input class="form-input" type="email" id="email" placeholder="ornek@mail.com" required autocomplete="email">
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Şifre</label>
            <input class="form-input" type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button class="submit-btn" type="submit" id="submit-btn">Giriş Yap</button>
    </form>

    <div class="auth-footer">
        Hesabın yok mu? <a href="/register">Kayıt ol</a>
    </div>
</div>

<script>
    // Already logged in → redirect
    if (localStorage.getItem('auth_token')) {
        window.location.href = '/';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const errorBox = document.getElementById('error-box');
        const errorMsg = document.getElementById('error-msg');

        errorBox.classList.remove('show');
        btn.disabled = true;
        btn.textContent = 'Giriş yapılıyor…';

        try {
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('email').value.trim(),
                    password: document.getElementById('password').value,
                }),
            });

            let data = {};
            try { data = await res.json(); } catch {}

            if (!res.ok) {
                errorMsg.textContent = data.detail || 'Giriş başarısız.';
                errorBox.classList.add('show');
                return;
            }

            localStorage.setItem('auth_token', data.access_token);
            localStorage.setItem('auth_user', JSON.stringify(data.user));
            window.location.href = '/';
        } catch {
            errorMsg.textContent = 'Bağlantı hatası. Lütfen tekrar deneyin.';
            errorBox.classList.add('show');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Giriş Yap';
        }
    });
</script>


</body>
</html>
